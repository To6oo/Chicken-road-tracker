<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicken Road Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🐔 Chicken Road Tracker</h1>

  <div class="card">
      <h2>Банка</h2>
      <h3 id="bank">100.00 €</h3>
  </div>

  <div class="card">
      <h2>Дневна цел</h2>
      <h3>150.00 €</h3>
  </div>

  <div class="buttons">

      <button onclick="lose()" class="lose">
          ❌ Загуба
      </button>

      <button onclick="first()" class="first">
          🥇 Първо
      </button>

      <button onclick="second()" class="second">
          🥈 Второ
      </button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
