<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Road Tracker Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🐔 Chicken Road Tracker Pro</h1>

<div class="dashboard">

<div class="card">
<h3>💰 Банка</h3>
<p id="bank">100.00 €</p>
</div>

<div class="card">
<h3>🎯 Цел</h3>
<p id="goal">150.00 €</p>
</div>

<div class="card">
<h3>🛑 Стоп</h3>
<p id="stop">80.00 €</p>
</div>

<div class="card">
<h3>📈 Резултат</h3>
<p id="profit">0.00 €</p>
</div>

</div>

<div class="section">

<h2>1️⃣ Къде кешира?</h2>

<label>
<input type="radio" name="cash" value="1" checked>
🥇 Печка 1
</label>

<label>
<input type="radio" name="cash" value="2">
🥈 Печка 2
</label>

</div>

<div class="section">

<h2>2️⃣ Как свърши играта?</h2>

<label>
<input type="radio" name="result" value="burn1" checked>
🔥 Изгоря на 1
</label>

<label>
<input type="radio" name="result" value="burn2">
🔥 Изгоря на 2
</label>

<label>
<input type="radio" name="result" value="after2">
🏁 След 2
</label>

</div>

<button id="saveRound">
✅ Запиши рунд
</button>

<div class="section">

<h2>📊 Статистика</h2>

<p>Общо рундове:
<span id="rounds">0</span></p>

<p>Победи:
<span id="wins">0</span></p>

<p>Загуби:
<span id="losses">0</span></p>

<p>Успеваемост:
<span id="rate">0%</span></p>

</div>

<div class="section">

<h2>📜 Последни рундове</h2>

<div id="history">

Няма записани рундове.

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
